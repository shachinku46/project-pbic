    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body { font-family: 'Segoe UI', sans-serif; background:#f8fafc; overflow-x: hidden; }

        /* HERO SECTION */
        .hero { height:80vh; position:relative; overflow:hidden; cursor: pointer; background: #000; }
        .hero-slider { position:absolute; width:100%; height:100%; }
        .slide { position:absolute; width:100%; height:100%; object-fit:cover; opacity:0; transition:1s; }
        .slide.active { opacity:1; }

        /* THE BLUE PART & TEXT WITH FADE EFFECT */
        .hero-shape { 
            position:absolute; inset:0; 
            background:linear-gradient(135deg,#06b6d4,#3b82f6); 
            clip-path:polygon(0 0,65% 0,45% 100%,0 100%); 
            opacity:.85; z-index: 5;
            transition: opacity 0.6s ease; 
        }

        .hero-content { 
            position:absolute; top:50%; left:60px; 
            transform:translateY(-50%); 
            color:white; z-index: 10; 
            transition: opacity 0.6s ease;
        }
        .hero-content h1 { font-size:clamp(2rem, 5vw, 3.5rem); font-weight:800; line-height: 1.1; }

        /* HOVER: Hide blue part and text to show photo clearly */
        .hero:hover .hero-shape, 
        .hero:hover .hero-content {
            opacity: 0;
        }

        /* GALLERY GRID - 4 PHOTOS PER LINE */
        .gallery { padding:60px 20px; display:flex; justify-content:center; }
        .gallery-container { 
            display:grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap:25px; max-width:1200px; width:100%; 
        }

        @media (max-width: 1024px) { .gallery-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .gallery-container { grid-template-columns: 1fr; } }
        
        .photo-card { border-radius:16px; overflow:hidden; background:white; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.1); transition:.3s; cursor: pointer; border: 1px solid #e2e8f0; }
        .photo-card a { text-decoration: none; color: inherit; }
        .photo-card img { width:100%; height:280px; object-fit:cover; transition:.4s; display: block; }
        .photo-card:hover img { transform:scale(1.05); }
        .photo-card:hover { transform:translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .photo-name { padding:15px; font-weight:600; font-size: 1.1rem; color: #1e293b; }

        .footer { background:#111; color:white; text-align:center; padding:40px; }
        .credit { background:#000; color:#aaa; text-align:center; padding:15px; font-size: 0.9rem; }
    </style>
</head>
