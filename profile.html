<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | PBIC Legends</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e3a8a; --secondary: #3b82f6; --light: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--light); color: #1e293b; overflow-x: hidden; }

        .back-btn {
            position: fixed; top: 25px; left: 25px; z-index: 100;
            background: white; color: var(--primary); padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .back-btn:hover { transform: translateX(-5px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        /* MUSIC CONTROL BUTTON - TOP RIGHT */
        .music-ctrl {
            position: fixed; top: 25px; right: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.2); color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid white; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .music-ctrl:hover { background: white; color: var(--primary); transform: scale(1.1); }

        .hero {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; padding: 40px;
        }

        .hero-content {
            max-width: 1100px; width: 100%;
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center;
        }

        .hero-text h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 700; margin-bottom: 10px; line-height: 1.1; }
        .subtitle { font-size: 1.5rem; opacity: 0.9; margin-bottom: 35px; }
        
        .info-box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .info-item { margin: 12px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 12px; }

        .insta-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: #E1306C; color: white; padding: 10px 20px;
            border-radius: 12px; text-decoration: none; margin-top: 15px;
            font-weight: 600; transition: 0.3s;
        }
        .insta-btn:hover { background: #c13584; transform: translateY(-3px); }

        .profile-image {
            width: 100%; aspect-ratio: 1; border-radius: 35px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); border: 5px solid rgba(255,255,255,0.2);
            animation: float 6s ease-in-out infinite;
        }
        .profile-image img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        @media (max-width: 900px) {
            .hero-content { grid-template-columns: 1fr; text-align: center; margin-top: 80px; }
            .profile-image { max-width: 350px; margin: 0 auto; }
            .info-box { display: inline-block; text-align: left; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</a>

    <div class="music-ctrl" id="musicBtn" onclick="handleMusic()">
        <i class="fas fa-play" id="musicIcon"></i>
    </div>
    <audio id="bgMusic" loop></audio>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h1 id="userName">Student Name</h1>
                <p class="subtitle">Class 10 • PBIC • Session 2026–27</p>
                
                <div class="info-box">
                    <div class="info-item"><i class="fas fa-graduation-cap"></i> Academic Excellence</div>
                    <div class="info-item"><i class="fas fa-star"></i> The Legends Member</div>
                    
                    <a href="#" id="instaLink" target="_blank" class="insta-btn">
                        <i class="fab fa-instagram"></i> <span id="instaText">Instagram</span>
                    </a>
                </div>
            </div>

            <div class="profile-image">
                <img id="userImg" src="" alt="Profile">
            </div>
        </div>
    </section>

    <script>
        // Extract URL parameters
        const params = new URLSearchParams(window.location.search);
        const name = params.get("name");
        const img = params.get("img");
        const insta = params.get("insta");
        const music = params.get("music");

        // Display user data
        if(name) document.getElementById("userName").innerText = name;
        if(img) document.getElementById("userImg").src = img;
        
        if(insta) {
            document.getElementById("instaLink").href = "https://www.instagram.com/" + insta;
            document.getElementById("instaText").innerText = "@" + insta;
        } else {
            document.getElementById("instaLink").style.display = "none";
        }

        // Music System Logic
        const audio = document.getElementById("bgMusic");
        const musicIcon = document.getElementById("musicIcon");
        let isPlaying = false;

        // Load the music URL from parameters
        if(music) {
            audio.src = music;
        } else {
            document.getElementById("musicBtn").style.display = "none";
        }

        // Play/Mute Control
        function handleMusic() {
            if (!isPlaying) {
                audio.play();
                isPlaying = true;
                musicIcon.classList.replace("fa-play", "fa-volume-up");
            } else {
                if (audio.muted) {
                    audio.muted = false;
                    musicIcon.classList.replace("fa-volume-mute", "fa-volume-up");
                } else {
                    audio.muted = true;
                    musicIcon.classList.replace("fa-volume-up", "fa-volume-mute");
                }
            }
        }
    </script>
</body>
</html>
